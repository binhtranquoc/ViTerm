<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ViTerm Loading</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        overflow: hidden;
      }

      .splash-frame {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .splash-icon {
        width: 128px;
        height: 128px;
        object-fit: contain;
      }

    </style>
  </head>
  <body>
    <div class="splash-frame">
      <img class="splash-icon" src="/icons/application_no_bg.png" alt="ViTerm icon" />
    </div>
  </body>
</html>
